<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela - Sistema Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', Arial, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .header {
            position: sticky;
            top: 0;
            background: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #ccff00;
        }

        .header a {
            text-decoration: none;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00, #00f5ff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 6s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        main {
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            max-width: 1200px;
            width: 100%;
            border: 2px solid #222;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00, #00f5ff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 6s linear infinite;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background: #1a1a1a;
            color: #ccff00;
            font-weight: 600;
        }

        tr:hover {
            background: #1a1a1a;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .delete-btn:hover {
            background: #ff4444;
        }

        .status-aprovado {
            background: #1a3a2a;
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            display: inline-block;
        }

        .status-recurso {
            background: #3a3a1a;
            color: #ccff00;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            display: inline-block;
        }

        .status-reprovado {
            background: #3a1a1a;
            color: #ff4444;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            display: inline-block;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-btn {
            flex: 1;
            background: #1a1a1a;
            color: #fff;
            padding: 12px;
            border: 2px solid #ccff00;
            border-radius: 50px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00);
            color: #000;
        }

        .btn-clear {
            background: #ffc107;
            color: #000;
            margin-bottom: 20px;
            border: none;
        }

        .btn-clear:hover {
            background: #ffdd44;
        }

        .info {
            text-align: center;
            margin-top: 15px;
            color: #888;
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .shape {
            position: absolute;
            right: 80px;
            top: 200px;
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #00f5ff, #00ff88, #ccff00);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            animation: rotateShape 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotateShape {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            main { padding: 20px; }
            .shape { display: none; }
            .container { padding: 20px; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="shape"></div>

    <header class="header">
        <a href="tt2.html">📊 Tabela</a>
    </header>

    <main>
        <div class="container">
            <h1>Lista de Alunos</h1>
            <div class="subtitle">Todos os alunos cadastrados</div>

            <button class="nav-btn btn-clear" onclick="clearAll()">🗑️ Limpar Todos os Alunos</button>

            <div class="table-wrapper">
                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Disciplina</th>
                            <th>1º Trim</th>
                            <th>2º Trim</th>
                            <th>3º Trim</th>
                            <th>Média</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="nav-buttons">
                <a href="ttt1.html" class="nav-btn">📝 Voltar ao Formulário</a>
                <a href="ttt3.html" class="nav-btn">📈 Ver Médias</a>
            </div>
            <div class="info" id="info"></div>
        </div>
    </main>

    <script>
        function getAlunos() {
            const saved = localStorage.getItem('alunos');
            return saved ? JSON.parse(saved) : [];
        }

        function saveAlunos(alunos) {
            localStorage.setItem('alunos', JSON.stringify(alunos));
        }

        function calcularMedia(nota1, nota2, nota3) {
            return (nota1 + nota2 + nota3) / 3;
        }

        function getStatus(media) {
            if (media >= 10) return 'Aprovado';
            if (media >= 8) return 'Recurso';
            return 'Reprovado';
        }

        function getStatusClass(status) {
            if (status === 'Aprovado') return 'status-aprovado';
            if (status === 'Recurso') return 'status-recurso';
            return 'status-reprovado';
        }

        function updateTable() {
            const alunos = getAlunos();
            const tbody = document.getElementById('tableBody');
            const info = document.getElementById('info');

            info.textContent = `Total de alunos: ${alunos.length}`;

            if (alunos.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Nenhum aluno cadastrado</td></tr>';
                return;
            }

            tbody.innerHTML = alunos.map((aluno, index) => {
                const media = calcularMedia(aluno.nota1, aluno.nota2, aluno.nota3);
                const status = getStatus(media);
                const statusClass = getStatusClass(status);
                return `
                    <tr>
                        <td>${aluno.nome}</td>
                        <td>${aluno.disciplina}</td>
                        <td>${aluno.nota1.toFixed(1)}</td>
                        <td>${aluno.nota2.toFixed(1)}</td>
                        <td>${aluno.nota3.toFixed(1)}</td>
                        <td><strong>${media.toFixed(1)}</strong></td>
                        <td><span class="${statusClass}">${status}</span></td>
                        <td><button class="delete-btn" onclick="deleteStudent(${index})">Excluir</button></td>
                    </tr>
                `;
            }).join('');
        }

        function deleteStudent(index) {
            if (confirm('Tem certeza que deseja excluir este aluno?')) {
                const alunos = getAlunos();
                alunos.splice(index, 1);
                saveAlunos(alunos);
                updateTable();
            }
        }

        function clearAll() {
            if (confirm('⚠️ ATENÇÃO! Isso apagará TODOS os alunos. Continuar?')) {
                localStorage.removeItem('alunos');
                updateTable();
            }
        }

        updateTable();
    </script>
</body>
</html>
