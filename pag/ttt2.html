<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado das Médias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .media-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .media-card h3 {
            margin-bottom: 10px;
        }

        .media-card p {
            font-size: 18px;
            margin-top: 10px;
        }

        .media-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .media-item {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .media-info {
            flex: 1;
        }

        .media-nome {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .media-disciplina {
            color: #666;
            font-size: 14px;
        }

        .notas {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .media-valor {
            font-size: 24px;
            font-weight: bold;
        }

        .aprovado {
            color: #28a745;
        }

        .reprovado {
            color: #dc3545;
        }

        .status {
            font-size: 14px;
            font-weight: 600;
            margin-left: 10px;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-btn {
            flex: 1;
            background: #6c757d;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: #5a6268;
        }

        @media (max-width: 600px) {
            .media-item {
                flex-direction: column;
                text-align: center;
            }
            
            .media-valor {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Resultado das Médias</h1>
        <div class="subtitle">Desempenho dos alunos</div>

        <div class="media-card">
            <h3>📊 Resumo da Turma</h3>
            <p id="totalAlunos">Total de alunos: 0</p>
            <p id="mediaGeral">Média geral: 0</p>
            <p id="aprovados">✅ Aprovados: 0</p>
            <p id="reprovados">❌ Reprovados: 0</p>
        </div>

        <div id="mediaList" class="media-list">
            <div class="empty">Nenhum aluno cadastrado</div>
        </div>

        <div class="nav-buttons">
            <a href="formulario.html" class="nav-btn">📝 Voltar ao Formulário</a>
            <a href="tabela.html" class="nav-btn">📊 Ver Tabela</a>
        </div>
    </div>

    <script>
        function getAlunos() {
            const saved = localStorage.getItem('alunos');
            return saved ? JSON.parse(saved) : [];
        }

        function calcularMedia(nota1, nota2, nota3) {
            return (nota1 + nota2 + nota3) / 3;
        }

        function getStatus(media) {
            return media >= 6 ? 'Aprovado' : 'Reprovado';
        }

        function updateResults() {
            const alunos = getAlunos();
            const mediaList = document.getElementById('mediaList');
            const totalAlunosSpan = document.getElementById('totalAlunos');
            const mediaGeralSpan = document.getElementById('mediaGeral');
            const aprovadosSpan = document.getElementById('aprovados');
            const reprovadosSpan = document.getElementById('reprovados');

            if (alunos.length === 0) {
                mediaList.innerHTML = '<div class="empty">Nenhum aluno cadastrado</div>';
                totalAlunosSpan.textContent = 'Total de alunos: 0';
                mediaGeralSpan.textContent = 'Média geral: 0';
                aprovadosSpan.textContent = '✅ Aprovados: 0';
                reprovadosSpan.textContent = '❌ Reprovados: 0';
                return;
            }

            let somaMedias = 0;
            let aprovadosCount = 0;

            mediaList.innerHTML = alunos.map(aluno => {
                const media = calcularMedia(aluno.nota1, aluno.nota2, aluno.nota3);
                somaMedias += media;
                const status = getStatus(media);
                const statusClass = status === 'Aprovado' ? 'aprovado' : 'reprovado';
                
                if (status === 'Aprovado') aprovadosCount++;

                return `
                    <div class="media-item">
                        <div class="media-info">
                            <div class="media-nome">${aluno.nome}</div>
                            <div class="media-disciplina">${aluno.disciplina}</div>
                            <div class="notas">Notas: ${aluno.nota1.toFixed(1)} | ${aluno.nota2.toFixed(1)} | ${aluno.nota3.toFixed(1)}</div>
                        </div>
                        <div>
                            <span class="media-valor ${statusClass}">${media.toFixed(1)}</span>
                            <span class="status ${statusClass}">(${status})</span>
                        </div>
                    </div>
                `;
            }).join('');

            const mediaGeral = somaMedias / alunos.length;
            const reprovadosCount = alunos.length - aprovadosCount;

            totalAlunosSpan.textContent = `Total de alunos: ${alunos.length}`;
            mediaGeralSpan.textContent = `Média geral: ${mediaGeral.toFixed(1)}`;
            aprovadosSpan.textContent = `✅ Aprovados: ${aprovadosCount}`;
            reprovadosSpan.textContent = `❌ Reprovados: ${reprovadosCount}`;
        }

        updateResults();
    </script>
</body>
</html>
