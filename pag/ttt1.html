<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Sistema Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', Arial, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* HEADER PRINCIPAL */
        .header {
            position: sticky;
            top: 0;
            background: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #ccff00;
        }

        .header a {
            text-decoration: none;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00, #00f5ff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 6s linear infinite;
        }

        /* BARRA TRIMESTRAL */
        .trimestres {
            background: #0a0a0a;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
        }

        .trimestres a {
            text-decoration: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            border: 2px solid #ccff00;
            color: #fff;
            transition: 0.3s;
            background: #111;
        }

        .trimestres a:hover {
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00);
            color: #000;
        }

        @keyframes gradientMove {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        /* MAIN */
        main {
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        /* CARD DO FORMULÁRIO */
        .card {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            max-width: 550px;
            width: 100%;
            border: 2px solid #222;
        }

        .card h1 {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00, #00f5ff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 6s linear infinite;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-notas {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 13px;
            text-align: center;
            border-left: 3px solid #ccff00;
        }

        .info-notas span {
            font-weight: bold;
            color: #ccff00;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ddd;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ccff00;
        }

        .btn {
            width: 100%;
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00);
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-btn {
            flex: 1;
            background: #1a1a1a;
            color: #fff;
            padding: 12px;
            border: 2px solid #ccff00;
            border-radius: 50px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: linear-gradient(90deg, #00f5ff, #00ff88, #ccff00);
            color: #000;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #1a3a2a;
            color: #00ff88;
            display: block;
            border-left: 3px solid #00ff88;
        }

        .message.error {
            background: #3a1a1a;
            color: #ff4444;
            display: block;
            border-left: 3px solid #ff4444;
        }

        /* TRIÂNGULO ANIMADO */
        .shape {
            position: absolute;
            right: 80px;
            top: 200px;
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #00f5ff, #00ff88, #ccff00);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            animation: rotateShape 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotateShape {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            main { padding: 20px; }
            .shape { display: none; }
            .card { padding: 25px; }
            .trimestres a { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="shape"></div>

    <header class="header">
        <a href="formulario.html">📝 Formulário</a>
    </header>

    <!-- BARRA TRIMESTRAL -->
    <div class="trimestres">

        <a href="trimestre1.html">📌 1º Trimestre</a>
        <a href="trimestre2.html">📌 2º Trimestre</a>
        <a href="trimestre3">📌 3º Trimestre</a>
    </div>

    <main>
        <div class="card">
            <h1>Cadastro de Aluno</h1>
            <div class="subtitle">Preencha os dados abaixo</div>

            

            <form id="studentForm">
                <div class="form-group">
                    <label>Nome do Aluno:</label>
                    <input type="text" id="nome" required placeholder="Digite o nome completo">
                </div>

                <div class="form-group">
                    <label>Disciplina:</label>
                    <input type="text" id="disciplina" required placeholder="Ex: Matemática, Português...">
                </div>

                <div class="form-group">
                    <label>Nota 1º Trimestre (0 a 20):</label>
                    <input type="number" id="nota1" step="0.1" min="0" max="20" required>
                </div>

                <div class="form-group">
                    <label>Nota 2º Trimestre (0 a 20):</label>
                    <input type="number" id="nota2" step="0.1" min="0" max="20" required>
                </div>

                <div class="form-group">
                    <label>Nota 3º Trimestre (0 a 20):</label>
                    <input type="number" id="nota3" step="0.1" min="0" max="20" required>
                </div>

                <button type="submit" class="btn">➕ Adicionar Aluno</button>
            </form>

            <div id="message" class="message"></div>

            <div class="nav-buttons">
                <a href="ttt2.html" class="nav-btn">📊 Ver Tabela</a>
                <a href="ttt3.html" class="nav-btn">📈 Ver Médias</a>
            </div>
        </div>
    </main>

    <script>
        function getAlunos() {
            const saved = localStorage.getItem('alunos');
            return saved ? JSON.parse(saved) : [];
        }

        function saveAlunos(alunos) {
            localStorage.setItem('alunos', JSON.stringify(alunos));
        }

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const disciplina = document.getElementById('disciplina').value.trim();
            const nota1 = parseFloat(document.getElementById('nota1').value);
            const nota2 = parseFloat(document.getElementById('nota2').value);
            const nota3 = parseFloat(document.getElementById('nota3').value);
            const messageDiv = document.getElementById('message');

            if (!nome || !disciplina) {
                messageDiv.textContent = 'Preencha nome e disciplina!';
                messageDiv.className = 'message error';
                setTimeout(() => messageDiv.className = 'message', 2000);
                return;
            }

            if (isNaN(nota1) || isNaN(nota2) || isNaN(nota3)) {
                messageDiv.textContent = 'Preencha todas as notas!';
                messageDiv.className = 'message error';
                setTimeout(() => messageDiv.className = 'message', 2000);
                return;
            }

            if (nota1 < 0 || nota1 > 20 || nota2 < 0 || nota2 > 20 || nota3 < 0 || nota3 > 20) {
                messageDiv.textContent = 'As notas devem estar entre 0 e 20!';
                messageDiv.className = 'message error';
                setTimeout(() => messageDiv.className = 'message', 2000);
                return;
            }

            const alunos = getAlunos();
            alunos.push({ nome, disciplina, nota1, nota2, nota3 });
            saveAlunos(alunos);

            this.reset();
            messageDiv.textContent = 'Aluno cadastrado com sucesso!';
            messageDiv.className = 'message success';
            setTimeout(() => messageDiv.className = 'message', 2000);
        });
    </script>
</body>
</html>
