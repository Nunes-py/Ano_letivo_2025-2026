<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Trimestre</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* FUNDO ESCURO TECNOLÓGICO */

body{
background:#000;
color:#fff;
min-height:100vh;
}

/* HEADER */

.header{
position:sticky;
top:0;
background:#111;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.header h1 a{
text-decoration:none;
padding:10px 20px;
background:#111;
border:2px solid #ccff00;
color:#fff;
border-radius:6px;
font-weight:600;
transition:.3s;
}

.header h1 a:hover{
background:linear-gradient(90deg,#00f5ff,#00ff88,#ccff00);
color:#000;
}

/* MENU */

nav{
display:flex;
gap:15px;
}

nav a{
text-decoration:none;
padding:10px 20px;
border:2px solid #ccff00;
color:#fff;
border-radius:6px;
font-weight:600;
transition:.3s;
}

nav a:hover{
background:linear-gradient(90deg,#00f5ff,#00ff88,#ccff00);
color:#000;
}

/* MAIN */

main{
padding:60px;
display:flex;
justify-content:center;
}

/* CAIXA DO TRIMESTRE */

.trimestre-box{
background:#111;
padding:40px;
border-radius:12px;
max-width:900px;
width:100%;
box-shadow:0 0 25px rgba(0,255,150,0.2);
position:relative;
}

/* TITULO COM GRADIENTE ANIMADO */

.trimestre-box h2{
text-align:center;
font-size:40px;
margin-bottom:40px;
font-weight:800;

background:linear-gradient(
90deg,
#00f5ff,
#00ff88,
#ccff00,
#00f5ff
);

background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:300%}
}

/* BOTÕES DOS TRABALHOS */

.trabalhos{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.trabalhos a{
padding:15px 25px;
border:2px solid #ccff00;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
color:#fff;
border-radius:8px;
transition:.3s;
}

.trabalhos a:hover{
background:linear-gradient(90deg,#00f5ff,#00ff88,#ccff00);
color:#000;
}

/* TRIÂNGULO TECNOLÓGICO */

.shape{
position:absolute;
right:-80px;
top:-80px;
width:200px;
height:200px;
background:linear-gradient(135deg,#00f5ff,#00ff88,#ccff00);
clip-path:polygon(50% 0%,100% 100%,0% 100%);
animation:rotateShape 10s linear infinite;
opacity:0.4;
}

@keyframes rotateShape{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* RESPONSIVO */

@media(max-width:800px){

.header{
flex-direction:column;
gap:10px;
}

main{
padding:30px;
}

.trimestre-box h2{
font-size:28px;
}

.shape{
display:none;
}

}

</style>
</head>

<body>

<header class="header">

<h1><a href="../index.html">HOME</a></h1>

<nav>
<a href="trimestre1.html">Iº Trimestre</a>
<a href="trimestre2.html">IIº Trimestre</a>
<a href="trimestre3.html">IIIº Trimestre</a>
</nav>

</header>

<main>

<div class="trimestre-box">

<div class="shape"></div>

<h2>Trabalhos do IIº Trimestre</h2>

<div class="trabalhos">
<a href="tt1.html">T1</a>
<a href="tt2.html">T2</a>
<a href="tt3.html">T3</a>
<a href="tt4.html">T4</a>
<a href="tt5.html">T5</a>
<a href="tt6.html">T6</a>
</div>

</div>

</main>

</body>
</html>
